<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <defs>
    <linearGradient id="peanutGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f5a623;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e8850a;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="shellGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#c97d10;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#a06208;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="3" stdDeviation="4" flood-color="#00000040"/>
    </filter>
    <radialGradient id="bgGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#1a1a2e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0d0d1a;stop-opacity:1" />
    </radialGradient>
  </defs>

  <!-- Background circle -->
  <circle cx="50" cy="50" r="48" fill="url(#bgGrad)" stroke="#f5a62330" stroke-width="1.5"/>

  <!-- Peanut shape (two lobes connected) -->
  <g filter="url(#shadow)" transform="translate(50,50) rotate(-35)">
    <!-- Left lobe -->
    <ellipse cx="-14" cy="0" rx="16" ry="20" fill="url(#peanutGrad)"/>
    <!-- Right lobe -->
    <ellipse cx="14" cy="0" rx="16" ry="20" fill="url(#peanutGrad)"/>
    <!-- Center connector -->
    <rect x="-8" y="-10" width="16" height="20" fill="url(#peanutGrad)" rx="2"/>
    <!-- Shell texture lines - left lobe -->
    <ellipse cx="-14" cy="0" rx="16" ry="20" fill="none" stroke="url(#shellGrad)" stroke-width="1.5" opacity="0.6"/>
    <line x1="-22" y1="-6" x2="-6" y2="-6" stroke="url(#shellGrad)" stroke-width="1" opacity="0.5" stroke-linecap="round"/>
    <line x1="-23" y1="0" x2="-5" y2="0" stroke="url(#shellGrad)" stroke-width="1" opacity="0.5" stroke-linecap="round"/>
    <line x1="-22" y1="6" x2="-6" y2="6" stroke="url(#shellGrad)" stroke-width="1" opacity="0.5" stroke-linecap="round"/>
    <!-- Shell texture lines - right lobe -->
    <ellipse cx="14" cy="0" rx="16" ry="20" fill="none" stroke="url(#shellGrad)" stroke-width="1.5" opacity="0.6"/>
    <line x1="6" y1="-6" x2="22" y2="-6" stroke="url(#shellGrad)" stroke-width="1" opacity="0.5" stroke-linecap="round"/>
    <line x1="5" y1="0" x2="23" y2="0" stroke="url(#shellGrad)" stroke-width="1" opacity="0.5" stroke-linecap="round"/>
    <line x1="6" y1="6" x2="22" y2="6" stroke="url(#shellGrad)" stroke-width="1" opacity="0.5" stroke-linecap="round"/>
    <!-- Center pinch -->
    <path d="M -8,-8 Q 0,-4 8,-8 Q 0,-12 -8,-8 Z" fill="#c97d10" opacity="0.7"/>
    <path d="M -8,8 Q 0,4 8,8 Q 0,12 -8,8 Z" fill="#c97d10" opacity="0.7"/>
  </g>

  <!-- Small circuit/AI dots accent -->
  <circle cx="78" cy="22" r="2.5" fill="#f5a623" opacity="0.8"/>
  <circle cx="85" cy="30" r="1.5" fill="#f5a623" opacity="0.5"/>
  <line x1="78" y1="22" x2="85" y2="30" stroke="#f5a623" stroke-width="1" opacity="0.4"/>
  <circle cx="22" cy="78" r="2.5" fill="#f5a623" opacity="0.8"/>
  <circle cx="15" cy="70" r="1.5" fill="#f5a623" opacity="0.5"/>
  <line x1="22" y1="78" x2="15" y2="70" stroke="#f5a623" stroke-width="1" opacity="0.4"/>
</svg>
