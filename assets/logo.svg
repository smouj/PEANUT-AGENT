<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 100" width="420" height="100">
  <defs>
    <linearGradient id="peanutGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f5a623;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e8850a;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="shellGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#c97d10;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#a06208;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="textGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e0e0f0;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f0f1a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0a0a12;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#00000050"/>
    </filter>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="420" height="100" rx="16" fill="url(#bgGrad)"/>
  <rect width="420" height="100" rx="16" fill="none" stroke="#f5a62325" stroke-width="1.5"/>

  <!-- Peanut icon (left side) -->
  <g transform="translate(50,50) rotate(-35)" filter="url(#shadow)">
    <!-- Left lobe -->
    <ellipse cx="-13" cy="0" rx="15" ry="19" fill="url(#peanutGrad)"/>
    <!-- Right lobe -->
    <ellipse cx="13" cy="0" rx="15" ry="19" fill="url(#peanutGrad)"/>
    <!-- Center connector -->
    <rect x="-7" y="-9" width="14" height="18" fill="url(#peanutGrad)" rx="2"/>
    <!-- Shell outlines -->
    <ellipse cx="-13" cy="0" rx="15" ry="19" fill="none" stroke="#c97d10" stroke-width="1.5" opacity="0.6"/>
    <ellipse cx="13" cy="0" rx="15" ry="19" fill="none" stroke="#c97d10" stroke-width="1.5" opacity="0.6"/>
    <!-- Texture lines left -->
    <line x1="-21" y1="-5" x2="-5" y2="-5" stroke="#c97d10" stroke-width="1" opacity="0.5" stroke-linecap="round"/>
    <line x1="-22" y1="0" x2="-4" y2="0" stroke="#c97d10" stroke-width="1" opacity="0.5" stroke-linecap="round"/>
    <line x1="-21" y1="5" x2="-5" y2="5" stroke="#c97d10" stroke-width="1" opacity="0.5" stroke-linecap="round"/>
    <!-- Texture lines right -->
    <line x1="5" y1="-5" x2="21" y2="-5" stroke="#c97d10" stroke-width="1" opacity="0.5" stroke-linecap="round"/>
    <line x1="4" y1="0" x2="22" y2="0" stroke="#c97d10" stroke-width="1" opacity="0.5" stroke-linecap="round"/>
    <line x1="5" y1="5" x2="21" y2="5" stroke="#c97d10" stroke-width="1" opacity="0.5" stroke-linecap="round"/>
    <!-- Center pinch -->
    <path d="M -7,-7 Q 0,-3 7,-7 Q 0,-11 -7,-7 Z" fill="#c97d10" opacity="0.7"/>
    <path d="M -7,7 Q 0,3 7,7 Q 0,11 -7,7 Z" fill="#c97d10" opacity="0.7"/>
  </g>

  <!-- Divider line -->
  <line x1="95" y1="20" x2="95" y2="80" stroke="#f5a62330" stroke-width="1"/>

  <!-- Main text: PeanutAgent -->
  <text x="112" y="52" font-family="'Segoe UI', 'Inter', 'Helvetica Neue', Arial, sans-serif"
        font-size="32" font-weight="800" letter-spacing="-0.5"
        fill="url(#textGrad)" filter="url(#shadow)">
    Peanut<tspan fill="#f5a623">Agent</tspan>
  </text>

  <!-- Subtitle: Enterprise -->
  <text x="113" y="72" font-family="'Segoe UI', 'Inter', 'Helvetica Neue', Arial, sans-serif"
        font-size="13" font-weight="400" letter-spacing="4"
        fill="#8888a8">
    ENTERPRISE
  </text>

  <!-- Version badge -->
  <rect x="310" y="36" width="82" height="24" rx="12" fill="#f5a62318" stroke="#f5a62340" stroke-width="1"/>
  <text x="351" y="52" font-family="'Segoe UI', 'Inter', 'Helvetica Neue', Arial, sans-serif"
        font-size="11" font-weight="600" fill="#f5a623" text-anchor="middle" letter-spacing="0.5">
    v2.0.0
  </text>

  <!-- Small accent dots -->
  <circle cx="395" cy="18" r="2" fill="#f5a623" opacity="0.6"/>
  <circle cx="403" cy="25" r="1.5" fill="#f5a623" opacity="0.4"/>
  <line x1="395" y1="18" x2="403" y2="25" stroke="#f5a623" stroke-width="0.8" opacity="0.3"/>
</svg>
