<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 320" width="1280" height="320">
  <defs>
    <!-- Gradients -->
    <linearGradient id="bgMain" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a14;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#0f0f1e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0a0a14;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="peanutGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f5a623;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#d4820a;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="shellGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#c97d10;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8a5508;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="titleGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:1" />
      <stop offset="60%" style="stop-color:#f0f0ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#c8c8e8;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#f5a623;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ff8c42;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="glowLine" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#f5a623;stop-opacity:0" />
      <stop offset="30%" style="stop-color:#f5a623;stop-opacity:0.8" />
      <stop offset="70%" style="stop-color:#f5a623;stop-opacity:0.8" />
      <stop offset="100%" style="stop-color:#f5a623;stop-opacity:0" />
    </linearGradient>
    <radialGradient id="centerGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#f5a623;stop-opacity:0.08" />
      <stop offset="100%" style="stop-color:#f5a623;stop-opacity:0" />
    </radialGradient>
    <radialGradient id="peanutGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#f5a623;stop-opacity:0.25" />
      <stop offset="100%" style="stop-color:#f5a623;stop-opacity:0" />
    </radialGradient>

    <!-- Filters -->
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#00000060"/>
    </filter>
    <filter id="peanutShadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="6" stdDeviation="12" flood-color="#f5a62340"/>
    </filter>
    <filter id="textGlow">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="subtleGlow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- ─── Background ──────────────────────────────────────────────────── -->
  <rect width="1280" height="320" fill="url(#bgMain)"/>

  <!-- Center radial glow -->
  <ellipse cx="640" cy="160" rx="500" ry="200" fill="url(#centerGlow)"/>

  <!-- Grid pattern (subtle) -->
  <g opacity="0.04" stroke="#f5a623" stroke-width="0.5">
    <!-- Vertical lines -->
    <line x1="160" y1="0" x2="160" y2="320"/>
    <line x1="320" y1="0" x2="320" y2="320"/>
    <line x1="480" y1="0" x2="480" y2="320"/>
    <line x1="640" y1="0" x2="640" y2="320"/>
    <line x1="800" y1="0" x2="800" y2="320"/>
    <line x1="960" y1="0" x2="960" y2="320"/>
    <line x1="1120" y1="0" x2="1120" y2="320"/>
    <!-- Horizontal lines -->
    <line x1="0" y1="80" x2="1280" y2="80"/>
    <line x1="0" y1="160" x2="1280" y2="160"/>
    <line x1="0" y1="240" x2="1280" y2="240"/>
  </g>

  <!-- Border -->
  <rect width="1280" height="320" fill="none" stroke="#f5a62320" stroke-width="1.5" rx="0"/>

  <!-- Top glow line -->
  <rect x="0" y="0" width="1280" height="2" fill="url(#glowLine)" opacity="0.6"/>
  <!-- Bottom glow line -->
  <rect x="0" y="318" width="1280" height="2" fill="url(#glowLine)" opacity="0.4"/>

  <!-- ─── Decorative circuit nodes (left side) ─────────────────────── -->
  <g opacity="0.3">
    <circle cx="40" cy="60" r="3" fill="#f5a623"/>
    <circle cx="80" cy="40" r="2" fill="#f5a623"/>
    <circle cx="40" cy="60" r="8" fill="none" stroke="#f5a623" stroke-width="0.8"/>
    <line x1="40" y1="60" x2="80" y2="40" stroke="#f5a623" stroke-width="0.8"/>
    <line x1="80" y1="40" x2="120" y2="55" stroke="#f5a623" stroke-width="0.8"/>
    <circle cx="120" cy="55" r="2" fill="#f5a623"/>
    <line x1="40" y1="60" x2="30" y2="100" stroke="#f5a623" stroke-width="0.8"/>
    <circle cx="30" cy="100" r="2" fill="#f5a623"/>
    <line x1="30" y1="100" x2="60" y2="120" stroke="#f5a623" stroke-width="0.8"/>
    <circle cx="60" cy="120" r="3" fill="#f5a623"/>
    <circle cx="60" cy="120" r="7" fill="none" stroke="#f5a623" stroke-width="0.8"/>
  </g>

  <!-- ─── Decorative circuit nodes (right side) ────────────────────── -->
  <g opacity="0.3">
    <circle cx="1240" cy="60" r="3" fill="#f5a623"/>
    <circle cx="1200" cy="40" r="2" fill="#f5a623"/>
    <circle cx="1240" cy="60" r="8" fill="none" stroke="#f5a623" stroke-width="0.8"/>
    <line x1="1240" y1="60" x2="1200" y2="40" stroke="#f5a623" stroke-width="0.8"/>
    <line x1="1200" y1="40" x2="1160" y2="55" stroke="#f5a623" stroke-width="0.8"/>
    <circle cx="1160" cy="55" r="2" fill="#f5a623"/>
    <line x1="1240" y1="60" x2="1250" y2="100" stroke="#f5a623" stroke-width="0.8"/>
    <circle cx="1250" cy="100" r="2" fill="#f5a623"/>
    <line x1="1250" y1="100" x2="1220" y2="120" stroke="#f5a623" stroke-width="0.8"/>
    <circle cx="1220" cy="120" r="3" fill="#f5a623"/>
    <circle cx="1220" cy="120" r="7" fill="none" stroke="#f5a623" stroke-width="0.8"/>
  </g>

  <!-- ─── Bottom decorative nodes ──────────────────────────────────── -->
  <g opacity="0.2">
    <circle cx="200" cy="280" r="2.5" fill="#f5a623"/>
    <circle cx="240" cy="295" r="1.5" fill="#f5a623"/>
    <line x1="200" y1="280" x2="240" y2="295" stroke="#f5a623" stroke-width="0.8"/>
    <circle cx="1080" cy="280" r="2.5" fill="#f5a623"/>
    <circle cx="1040" cy="295" r="1.5" fill="#f5a623"/>
    <line x1="1080" y1="280" x2="1040" y2="295" stroke="#f5a623" stroke-width="0.8"/>
  </g>

  <!-- ─── Large Peanut Icon (left of center) ───────────────────────── -->
  <!-- Glow halo -->
  <ellipse cx="200" cy="160" rx="90" ry="90" fill="url(#peanutGlow)"/>

  <g transform="translate(200,160) rotate(-40)" filter="url(#peanutShadow)">
    <!-- Left lobe -->
    <ellipse cx="-32" cy="0" rx="36" ry="46" fill="url(#peanutGrad)"/>
    <!-- Right lobe -->
    <ellipse cx="32" cy="0" rx="36" ry="46" fill="url(#peanutGrad)"/>
    <!-- Center connector fill -->
    <rect x="-18" y="-22" width="36" height="44" fill="url(#peanutGrad)" rx="4"/>

    <!-- Shell outlines -->
    <ellipse cx="-32" cy="0" rx="36" ry="46" fill="none" stroke="#c97d10" stroke-width="2.5" opacity="0.7"/>
    <ellipse cx="32" cy="0" rx="36" ry="46" fill="none" stroke="#c97d10" stroke-width="2.5" opacity="0.7"/>

    <!-- Texture lines - left lobe -->
    <line x1="-52" y1="-14" x2="-12" y2="-14" stroke="#c97d10" stroke-width="1.5" opacity="0.5" stroke-linecap="round"/>
    <line x1="-55" y1="-4" x2="-9" y2="-4" stroke="#c97d10" stroke-width="1.5" opacity="0.5" stroke-linecap="round"/>
    <line x1="-55" y1="6" x2="-9" y2="6" stroke="#c97d10" stroke-width="1.5" opacity="0.5" stroke-linecap="round"/>
    <line x1="-52" y1="16" x2="-12" y2="16" stroke="#c97d10" stroke-width="1.5" opacity="0.5" stroke-linecap="round"/>

    <!-- Texture lines - right lobe -->
    <line x1="12" y1="-14" x2="52" y2="-14" stroke="#c97d10" stroke-width="1.5" opacity="0.5" stroke-linecap="round"/>
    <line x1="9" y1="-4" x2="55" y2="-4" stroke="#c97d10" stroke-width="1.5" opacity="0.5" stroke-linecap="round"/>
    <line x1="9" y1="6" x2="55" y2="6" stroke="#c97d10" stroke-width="1.5" opacity="0.5" stroke-linecap="round"/>
    <line x1="12" y1="16" x2="52" y2="16" stroke="#c97d10" stroke-width="1.5" opacity="0.5" stroke-linecap="round"/>

    <!-- Center pinch top -->
    <path d="M -18,-18 Q 0,-8 18,-18 Q 0,-28 -18,-18 Z" fill="#a06208" opacity="0.8"/>
    <!-- Center pinch bottom -->
    <path d="M -18,18 Q 0,8 18,18 Q 0,28 -18,18 Z" fill="#a06208" opacity="0.8"/>

    <!-- Highlight sheen -->
    <ellipse cx="-38" cy="-18" rx="10" ry="6" fill="white" opacity="0.12" transform="rotate(20,-38,-18)"/>
    <ellipse cx="26" cy="-18" rx="10" ry="6" fill="white" opacity="0.12" transform="rotate(20,26,-18)"/>
  </g>

  <!-- ─── Main Title ─────────────────────────────────────────────────── -->
  <text x="340" y="130" font-family="'Segoe UI', 'Inter', 'Helvetica Neue', Arial, sans-serif"
        font-size="72" font-weight="900" letter-spacing="-2"
        fill="url(#titleGrad)" filter="url(#shadow)">
    Peanut<tspan fill="url(#accentGrad)" filter="url(#textGlow)">Agent</tspan>
  </text>

  <!-- Subtitle line -->
  <text x="342" y="165" font-family="'Segoe UI', 'Inter', 'Helvetica Neue', Arial, sans-serif"
        font-size="18" font-weight="300" letter-spacing="8"
        fill="#8888a8">
    ENTERPRISE  ·  AI GATEWAY PLATFORM
  </text>

  <!-- Horizontal accent line under subtitle -->
  <rect x="342" y="178" width="580" height="1.5" fill="url(#glowLine)" opacity="0.5"/>

  <!-- ─── Tagline ────────────────────────────────────────────────────── -->
  <text x="342" y="215" font-family="'Segoe UI', 'Inter', 'Helvetica Neue', Arial, sans-serif"
        font-size="16" font-weight="400" fill="#b0b0cc">
    Local-First · MCP Native · Zero API Costs · Full Privacy
  </text>

  <!-- ─── Feature pills ─────────────────────────────────────────────── -->
  <!-- MCP Server pill -->
  <rect x="342" y="238" width="120" height="28" rx="14" fill="#f5a62315" stroke="#f5a62345" stroke-width="1"/>
  <text x="402" y="256" font-family="'Segoe UI', 'Inter', Arial, sans-serif"
        font-size="11" font-weight="600" fill="#f5a623" text-anchor="middle" letter-spacing="0.3">
    🔌 MCP Server
  </text>

  <!-- Ollama pill -->
  <rect x="472" y="238" width="110" height="28" rx="14" fill="#22c55e15" stroke="#22c55e45" stroke-width="1"/>
  <text x="527" y="256" font-family="'Segoe UI', 'Inter', Arial, sans-serif"
        font-size="11" font-weight="600" fill="#22c55e" text-anchor="middle" letter-spacing="0.3">
    🤖 Ollama LLM
  </text>

  <!-- Docker pill -->
  <rect x="592" y="238" width="100" height="28" rx="14" fill="#2496ed15" stroke="#2496ed45" stroke-width="1"/>
  <text x="642" y="256" font-family="'Segoe UI', 'Inter', Arial, sans-serif"
        font-size="11" font-weight="600" fill="#2496ed" text-anchor="middle" letter-spacing="0.3">
    🐳 Docker
  </text>

  <!-- Security pill -->
  <rect x="702" y="238" width="120" height="28" rx="14" fill="#a855f715" stroke="#a855f745" stroke-width="1"/>
  <text x="762" y="256" font-family="'Segoe UI', 'Inter', Arial, sans-serif"
        font-size="11" font-weight="600" fill="#a855f7" text-anchor="middle" letter-spacing="0.3">
    🔒 Enterprise
  </text>

  <!-- Next.js pill -->
  <rect x="832" y="238" width="110" height="28" rx="14" fill="#ffffff10" stroke="#ffffff25" stroke-width="1"/>
  <text x="887" y="256" font-family="'Segoe UI', 'Inter', Arial, sans-serif"
        font-size="11" font-weight="600" fill="#e0e0e0" text-anchor="middle" letter-spacing="0.3">
    ⚡ Next.js 15
  </text>

  <!-- ─── Version badge (bottom right) ─────────────────────────────── -->
  <rect x="1140" y="270" width="110" height="32" rx="16" fill="#f5a62318" stroke="#f5a62450" stroke-width="1.5"/>
  <text x="1195" y="290" font-family="'Segoe UI', 'Inter', Arial, sans-serif"
        font-size="13" font-weight="700" fill="#f5a623" text-anchor="middle" letter-spacing="1">
    v2.0.0
  </text>

  <!-- ─── KiloCode companion badge ──────────────────────────────────── -->
  <rect x="1060" y="228" width="190" height="32" rx="16" fill="#6366f115" stroke="#6366f145" stroke-width="1"/>
  <text x="1155" y="248" font-family="'Segoe UI', 'Inter', Arial, sans-serif"
        font-size="11" font-weight="600" fill="#818cf8" text-anchor="middle" letter-spacing="0.3">
    ✨ KiloCode Companion
  </text>

  <!-- ─── MIT License badge ─────────────────────────────────────────── -->
  <rect x="1100" y="188" width="80" height="26" rx="13" fill="#22c55e12" stroke="#22c55e35" stroke-width="1"/>
  <text x="1140" y="205" font-family="'Segoe UI', 'Inter', Arial, sans-serif"
        font-size="10" font-weight="600" fill="#22c55e" text-anchor="middle" letter-spacing="0.5">
    MIT License
  </text>

  <!-- ─── TypeScript badge ──────────────────────────────────────────── -->
  <rect x="1190" y="188" width="70" height="26" rx="13" fill="#3178c615" stroke="#3178c640" stroke-width="1"/>
  <text x="1225" y="205" font-family="'Segoe UI', 'Inter', Arial, sans-serif"
        font-size="10" font-weight="600" fill="#3178c6" text-anchor="middle" letter-spacing="0.5">
    TypeScript
  </text>
</svg>
